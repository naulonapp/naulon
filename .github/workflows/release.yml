name: Release (npm)

# Publishes the publisher-facing @naulon/* packages to npm on a version tag.
# Ordered by the real dependency graph — sdk (clean base) → shared (imports sdk)
# → enforce (imports shared) → wayfarer (imports shared) → wayfarer-mcp (imports
# shared + wayfarer). @naulon/tollgate is NOT published here: the gate ships as a
# Docker image (see the OSS distribution decision), not npm.
#
# Every publish is IDEMPOTENT: a version already on the registry is skipped, so a
# tag can ship only the packages whose version actually changed without failing on
# the ones already published (e.g. re-tagging when only wayfarer-mcp bumped).
#
# Trigger: push a tag like `v0.2.0`, or run manually (workflow_dispatch).
# Auth: repo secret NPM_TOKEN (an npm automation token with publish rights on the
# @naulon scope). setup-node wires it into ~/.npmrc via NODE_AUTH_TOKEN — the token
# is never echoed. Provenance is on (public repo → verifiable supply-chain link).

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write # create the GitHub Release + attach tarballs
  id-token: write # required for npm provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      # Build in dependency order so each package's dist/ resolves the one below it.
      # (prepublishOnly rebuilds too, but building up front fails fast on a bad tree.)
      - name: Build sdk → shared → enforce → wayfarer → wayfarer-mcp
        run: |
          npm run build -w @naulon/sdk
          npm run build -w @naulon/shared
          npm run build -w @naulon/enforce
          npm run build -w @naulon/wayfarer
          npm run build -w @naulon/wayfarer-mcp

      # Idempotent publish, in dependency order. --access public is required for a
      # first-time scoped publish. Each package's prepublishOnly re-runs its build
      # (harmless). A version already on the registry is skipped, not re-published —
      # so the run never fails on an unchanged package.
      - name: Publish changed @naulon packages
        run: |
          set -euo pipefail
          publish() {
            local pkg="$1"
            local ver
            ver=$(node -p "require('./packages/${pkg}/package.json').version")
            local name
            name=$(node -p "require('./packages/${pkg}/package.json').name")
            if npm view "${name}@${ver}" version >/dev/null 2>&1; then
              echo "→ ${name}@${ver} already published, skipping"
            else
              echo "→ publishing ${name}@${ver}"
              npm publish -w "${name}" --access public --provenance
            fi
          }
          publish sdk
          publish shared
          publish enforce
          publish wayfarer
          publish wayfarer-mcp
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Second home for the exact build artifacts: a GitHub Release with the
      # published .tgz attached (identical to what npm serves). npm stays the
      # canonical install source; this is a no-auth download mirror + changelog.
      - name: Pack the published tarballs
        run: |
          mkdir -p _release
          npm pack -w @naulon/sdk         --pack-destination _release
          npm pack -w @naulon/shared      --pack-destination _release
          npm pack -w @naulon/enforce     --pack-destination _release
          npm pack -w @naulon/wayfarer    --pack-destination _release
          npm pack -w @naulon/wayfarer-mcp --pack-destination _release

      - name: GitHub Release (attach tarballs)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: _release/*.tgz
          generate_release_notes: true
