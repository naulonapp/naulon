name: CI

# Typecheck + test on every push to main and every PR. Runs the same `make`
# targets contributors run locally; no build step (everything runs from TS via tsx).
on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck (tsc --noEmit)
        run: make lint

      - name: Test (incl. license interop conformance)
        run: make test
